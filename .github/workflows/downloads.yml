name: Update KDE Store Downloads Badge

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch:    # Allows manual trigger

jobs:
  update-badge:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Fetch downloads and generate JSON
        run: |
          # Fetch total downloads from KDE Store
          TOTAL=$(curl -s 'https://store.kde.org/p/2356087/loadFiles' | jq '[.files[].downloaded_count_uk // 0] | add')
          
          # Ensure the target directory exists
          mkdir -p .github/badges
          
          # Generate the JSON file for Shields.io
          echo "{\"schemaVersion\": 1, \"label\": \"Downloads\", \"message\": \"$TOTAL\", \"color\": \"blue\"}" > .github/badges/downloads-badge.json

      - name: Commit and push changes
        run: |
          # Setup Git bot user
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Stage the badge file
          git add .github/badges/downloads-badge.json
          
          # Commit only if the file has changed, then push
          git commit -m "chore: update downloads badge" || exit 0
          git push
